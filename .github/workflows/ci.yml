name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: python -m py_compile backend/server.py backend/ml_service.py backend_test.py backend_test_extended.py

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --non-interactive

      - name: Build frontend
        working-directory: frontend
        env:
          CI: "false"
          REACT_APP_BACKEND_URL: "http://localhost:8000"
        run: yarn build
